    <text x="338" y="74" text-anchor="middle" fill="#fff">Extensions</text>
    <text x="455" y="74" text-anchor="middle">AI</text>
    <text x="565" y="74" text-anchor="middle">Cloud Sync</text>
    <text x="688" y="74" text-anchor="middle">Account</text>
    <text x="810" y="74" text-anchor="middle">Organizations</text>
    <text x="944" y="74" text-anchor="middle">Advanced</text>
    <text x="1058" y="74" text-anchor="middle">About</text>
  </g>

  <line x1="0" y1="118" x2="1280" y2="118" stroke="#343434"/>
  <line x1="875" y1="118" x2="875" y2="760" stroke="#343434"/>

  <rect x="20" y="130" width="260" height="34" rx="12" fill="#232323" stroke="#4a4a4a"/>
  <text x="32" y="153" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#888">Search...</text>

  <g font-family="Arial, sans-serif" font-size="16" font-weight="700">
    <text x="315" y="153" fill="#b5b5b5">All</text>
    <text x="385" y="153" fill="#b5b5b5">Commands</text>
