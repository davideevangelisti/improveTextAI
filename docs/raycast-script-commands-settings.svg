    <text x="600" y="153" fill="#b5b5b5">Apps</text>
    <text x="675" y="153" fill="#b5b5b5">Quicklinks</text>
  </g>

  <line x1="0" y1="176" x2="875" y2="176" stroke="#3d3d3d"/>
  <g font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#999">
    <text x="26" y="207">Name</text>
    <text x="376" y="207">Type</text>
    <text x="515" y="207">Alias</text>
    <text x="642" y="207">Hotkey</text>
    <text x="795" y="207">Enabled</text>
  </g>
  <rect x="10" y="225" width="855" height="48" rx="12" fill="#2f70b7"/>
  <rect x="50" y="238" width="20" height="20" rx="5" fill="#ff4f58"/>
