  <circle cx="52" cy="22" r="9" fill="#3f3f3f"/>
  <circle cx="82" cy="22" r="9" fill="#3f3f3f"/>

  <text x="640" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#a8a8a8">Raycast Settings</text>

  <g font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#b9b9b9">
    <text x="220" y="74" text-anchor="middle">General</text>
