<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Raycast Script Commands settings reference</title>
  <desc id="desc">A reference image showing Raycast Settings, Extensions, Scripts, Script Commands, and the Add Directories area where the improveTextAI folder should be listed.</desc>
  <rect width="1280" height="760" rx="18" fill="#1f1f1f"/>
  <rect x="1" y="1" width="1278" height="758" rx="18" fill="none" stroke="#303030"/>

