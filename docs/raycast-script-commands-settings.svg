    <text x="935" y="525" font-size="16" font-weight="700" fill="#9c9c9c">~/Library/Mobile Documents/.../Projects/tools/improveTextAI</text>

    <rect x="1133" y="481" width="108" height="48" rx="10" fill="none" stroke="#5aa7ff" stroke-width="3" stroke-dasharray="8 6"/>
    <text x="1187" y="511" text-anchor="middle" font-size="15" font-weight="700" fill="#9ecbff">target folder</text>
