  <text x="376" y="256" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#a8c6ea">Group</text>
  <text x="515" y="256" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#a8c6ea">--</text>
  <text x="642" y="256" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#a8c6ea">--</text>
  <rect x="818" y="239" width="17" height="17" rx="5" fill="none" stroke="#82b0df" stroke-width="2"/>
  <path d="M823 247l3 4 6-8" fill="none" stroke="#82b0df" stroke-width="2"/>

